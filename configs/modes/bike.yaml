mode: bike
description: "Bicycle and motorcycle riding mode"

observation:
  frame_width: 320
  frame_height: 180
  frame_stack: 4
  color_mode: rgb
  extra_crops:
    minimap: [10, 700, 210, 900]
    speed_hud: [650, 700, 690, 850]

action_space:
  keys:
    - { name: W, type: binary, description: "Accelerate" }
    - { name: S, type: binary, description: "Brake" }
    - { name: A, type: binary, description: "Lean / steer left" }
    - { name: D, type: binary, description: "Lean / steer right" }
    - { name: SPACE, type: binary, description: "Handbrake / Skid" }
    - { name: SHIFT, type: binary, description: "Turbo / Nitro" }
    - { name: E, type: binary, description: "Exit bike" }
    - { name: Q, type: binary, description: "Drive-by / Melee" }
    - { name: CTRL, type: binary, description: "Wheelie / Stoppie" }
  mouse:
    dx: { type: continuous, range: [-50, 50], description: "Camera / lean X" }
    dy: { type: continuous, range: [-50, 50], description: "Camera / lean Y" }

model:
  backbone_type: custom_cnn
  supported_backbones: [custom_cnn, mobilevit, efficientvit, tinyvit]
  pretrained: false
  img_size: 224
  hidden_dim: 192
  num_heads: 4
  dropout: 0.1
  context_type: frame_stack
