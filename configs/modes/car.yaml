mode: car
description: "Car/sedan/SUV driving mode"

observation:
  frame_width: 320
  frame_height: 180
  frame_stack: 4
  color_mode: rgb
  extra_crops:
    minimap: [10, 700, 210, 900]
    speed_hud: [650, 700, 690, 850]

action_space:
  keys:
    - { name: W, type: binary, description: "Accelerate" }
    - { name: S, type: binary, description: "Brake / Reverse" }
    - { name: A, type: binary, description: "Steer left" }
    - { name: D, type: binary, description: "Steer right" }
    - { name: SPACE, type: binary, description: "Handbrake" }
    - { name: SHIFT, type: binary, description: "Turbo / Nitro (if available)" }
    - { name: E, type: binary, description: "Exit vehicle" }
    - { name: Q, type: binary, description: "Special ability" }
    - { name: H, type: binary, description: "Horn" }
  mouse:
    dx: { type: continuous, range: [-40, 40], description: "Camera X pan" }
    dy: { type: continuous, range: [-40, 40], description: "Camera Y pan" }

model:
  backbone_type: custom_cnn
  supported_backbones: [custom_cnn, mobilevit, efficientvit, tinyvit]
  pretrained: false
  img_size: 224
  hidden_dim: 256
  num_heads: 4
  dropout: 0.1
  context_type: frame_stack
