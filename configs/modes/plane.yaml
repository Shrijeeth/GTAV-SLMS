mode: plane
description: "Fixed-wing plane flying mode"

observation:
  frame_width: 320
  frame_height: 180
  frame_stack: 6
  color_mode: rgb
  extra_crops:
    minimap: [10, 700, 210, 900]
    altitude_hud: [5, 350, 40, 450]

action_space:
  keys:
    - { name: W, type: binary, description: "Pitch down (nose down)" }
    - { name: S, type: binary, description: "Pitch up (nose up)" }
    - { name: A, type: binary, description: "Yaw left" }
    - { name: D, type: binary, description: "Yaw right" }
    - { name: NUM4, type: binary, description: "Roll left" }
    - { name: NUM6, type: binary, description: "Roll right" }
    - { name: W+SHIFT, type: binary, description: "Boost / After-burner" }
    - { name: SPACE, type: binary, description: "Landing gear / Brake" }
    - { name: E, type: binary, description: "Exit aircraft" }
  mouse:
    dx: { type: continuous, range: [-80, 80], description: "Roll / Yaw assist" }
    dy: { type: continuous, range: [-80, 80], description: "Pitch assist" }
    left_click: { type: binary, description: "Fire weapon" }

model:
  backbone_type: custom_cnn
  supported_backbones: [custom_cnn, mobilevit, efficientvit, tinyvit]
  pretrained: false
  img_size: 224
  hidden_dim: 320
  num_heads: 8
  dropout: 0.1
  context_type: transformer
  context_window: 8
