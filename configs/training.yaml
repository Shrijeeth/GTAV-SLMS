# Global training hyper-parameters (can be overridden per mode)
training:
  batch_size: 64
  learning_rate: 3.0e-4
  weight_decay: 1.0e-5
  epochs: 100
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 5
  mixed_precision: true
  gradient_checkpointing: true
  gradient_clip: 1.0
  seed: 42

data:
  train_split: 0.85
  val_split: 0.10
  test_split: 0.05
  num_workers: 4
  pin_memory: true

logging:
  backend: wandb            # wandb | tensorboard
  project: gtav-slms
  log_every_n_steps: 50
  save_top_k: 3

checkpoints:
  dir: checkpoints/
  monitor: val_loss
  mode: min
